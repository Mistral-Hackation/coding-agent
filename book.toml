[book]
authors = ["Hamze Ghalebi"]
language = "en"
src = "docs/src"
title = "build123d CAD Generator Documentation"

[output.html]
git-repository-url = "https://github.com/hghalebi/rust-code-generator"
site-url = "/build123d-cad/"
edit-url-template = "https://github.com/hghalebi/rust-code-generator/edit/main/docs/src/{path}"

# 🟢 Feature: Runnable Code Blocks
# This allows readers to run snippets directly if they have a compatible backend,
# or simply provides a copy button and language syntax highlighting.
[output.html.playground]
editable = true
line-numbers = true
copyable = true

# 🟢 Feature: Search
[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = true
level = 0

# 📦 Distribution: Single File Output (Optional)
# Useful for creating a "Printable" version of the course.
[output.html.print]
enable = true
